<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWI Station Production Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0c0f;
  --bg2:       #0f1215;
  --bg3:       #141820;
  --bg4:       #1a2030;
  --panel:     #111418;
  --border:    #1e2530;
  --border2:   #2a3344;
  --accent:    #c8922a;
  --accent2:   #e8ab3a;
  --accentdim: rgba(200,146,42,0.12);
  --accentglow:rgba(200,146,42,0.25);
  --blue:      #3a7fd4;
  --bluedim:   rgba(58,127,212,0.15);
  --green:     #3a9e6a;
  --greendim:  rgba(58,158,106,0.15);
  --red:       #c44a3a;
  --reddim:    rgba(196,74,58,0.15);
  --text:      #d4d8e0;
  --text2:     #8a92a0;
  --text3:     #4a5260;
  --mono:      'Share Tech Mono', monospace;
  --sans:      'Barlow', sans-serif;
  --cond:      'Barlow Condensed', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────────────────── */
.header {
  height: 52px;
  background: var(--panel);
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 20px;
  flex-shrink: 0;
}
.header-logo {
  font-family: var(--cond);
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent2);
  text-transform: uppercase;
  white-space: nowrap;
}
.header-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 24px;
}
.sun-control {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 6px 14px;
}
.sun-icon {
  font-size: 16px;
  color: var(--accent);
}
.sun-label {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  white-space: nowrap;
}
.sun-slider-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
input[type=range] {
  -webkit-appearance: none;
  width: 180px;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  cursor: pointer;
  transition: background 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { background: var(--accent2); }
.sun-input-wrap {
  display: flex;
  align-items: center;
  gap: 2px;
}
.sun-num-input {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  width: 54px;
  text-align: right;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 3px 6px;
  outline: none;
  color: var(--accent2);
  transition: border-color 0.15s, color 0.15s;
}
.sun-num-input:focus { border-color: var(--accent); }
.sun-pct-sym {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--accent);
  margin-left: 1px;
}
.sun-desc {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
}
.sun-desc.boosted { color: var(--green); }
.sun-desc.reduced { color: var(--red); }

/* ── LAYOUT ─────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 360px 1fr;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── LEFT PANEL ─────────────────────────────────────── */
.left {
  background: var(--panel);
  border-right: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title {
  font-family: var(--cond);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
}
.sel-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: var(--accentdim);
  border: 1px solid rgba(200,146,42,0.3);
  padding: 2px 8px;
  border-radius: 2px;
}
.search-wrap {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.search-wrap input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 7px 12px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text3); }
.ware-scroll {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.ware-scroll::-webkit-scrollbar { width: 4px; }
.ware-scroll::-webkit-scrollbar-track { background: transparent; }
.ware-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.tier-label {
  padding: 5px 14px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 2;
}
.ware-row {
  display: flex;
  align-items: center;
  padding: 5px 12px;
  gap: 8px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.ware-row:hover { background: var(--bg3); }
.ware-row:last-child { border-bottom: none; }
.tier-badge {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 2px;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}
.t0 { background: rgba(58,127,212,0.2); color: #7aafec; border: 1px solid rgba(58,127,212,0.3); }
.t1 { background: rgba(58,158,106,0.2); color: #7acca0; border: 1px solid rgba(58,158,106,0.3); }
.t2 { background: rgba(200,146,42,0.2); color: #e8c070; border: 1px solid rgba(200,146,42,0.3); }
.t3 { background: rgba(196,74,58,0.2); color: #e89088; border: 1px solid rgba(196,74,58,0.3); }
.t4 { background: rgba(160,80,200,0.2); color: #c8a0e8; border: 1px solid rgba(160,80,200,0.3); }

.ware-name {
  flex: 1;
  font-size: 13px;
  color: var(--text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sun-tag {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--accent);
  background: var(--accentdim);
  border: 1px solid rgba(200,146,42,0.25);
  padding: 1px 4px;
  border-radius: 2px;
  flex-shrink: 0;
}
.ware-vol {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text3);
  width: 40px;
  text-align: right;
  flex-shrink: 0;
}
.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.qb {
  width: 22px;
  height: 22px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 2px;
  color: var(--text2);
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transition: background 0.1s, color 0.1s, border-color 0.1s;
}
.qb:hover { background: var(--bg4); border-color: var(--accent); color: var(--accent2); }
.qn {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  width: 24px;
  text-align: center;
  color: var(--text3);
  transition: color 0.15s;
}
.qn.on { color: var(--accent2); }

.left-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border2);
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.btn-calc {
  flex: 1;
  padding: 9px 16px;
  background: var(--accent);
  border: none;
  border-radius: 3px;
  color: #0a0c0f;
  font-family: var(--cond);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn-calc:hover { background: var(--accent2); }
.btn-calc:active { transform: scale(0.98); }
.btn-reset {
  padding: 9px 14px;
  background: transparent;
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--text2);
  font-family: var(--cond);
  font-size: 13px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-reset:hover { background: var(--bg3); border-color: var(--text3); color: var(--text); }

/* ── RIGHT PANEL ─────────────────────────────────────── */
.right {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg2);
}
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}
.stat-card {
  padding: 14px 24px;
  border-right: 1px solid var(--border);
}
.stat-card:last-child { border-right: none; }
.stat-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 4px;
}
.stat-val {
  font-family: var(--cond);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  line-height: 1;
}

.results-scroll {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.results-scroll::-webkit-scrollbar { width: 4px; }
.results-scroll::-webkit-scrollbar-track { background: transparent; }
.results-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--text3);
}
.empty-icon {
  font-size: 36px;
  opacity: 0.3;
}
.empty-text {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-align: center;
  line-height: 1.8;
  text-transform: uppercase;
}

/* ── RESULTS TABLE ───────────────────────────────────── */
.results-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  padding: 20px 24px;
  gap: 20px;
}
.result-section {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 4px;
  overflow: hidden;
}
.result-section.full-width {
  grid-column: 1 / -1;
}
.sec-head {
  padding: 8px 16px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border2);
  font-family: var(--cond);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text2);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sec-count {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  background: var(--accentdim);
  padding: 1px 7px;
  border-radius: 2px;
}

table {
  width: 100%;
  border-collapse: collapse;
}
th {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text3);
  padding: 6px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  position: sticky;
  top: 0;
}
th.r { text-align: right; }
td {
  padding: 6px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text);
  vertical-align: middle;
}
td.r {
  text-align: right;
  font-family: var(--mono);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--bg3); }

.rname-cell {
  display: flex;
  align-items: center;
  gap: 6px;
}
.user-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--bluedim);
  color: var(--blue);
  border: 1px solid rgba(58,127,212,0.3);
  flex-shrink: 0;
}
.support-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--bg3);
  color: var(--text3);
  border: 1px solid var(--border2);
  flex-shrink: 0;
}
.sun-result-badge {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 2px;
  background: var(--accentdim);
  color: var(--accent);
  border: 1px solid rgba(200,146,42,0.3);
  flex-shrink: 0;
}
.qty-cell {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
}
.phr-cell {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
}
.net-surplus { color: #5ec490; font-weight: 500; }
.net-deficit  { color: #e07060; font-weight: 500; }
.net-balanced { color: var(--text3); }

.raw-table td { font-size: 13px; }
.raw-amt { font-family: var(--mono); font-size: 12px; color: var(--text2); text-align: right; }

.sun-info-row {
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  letter-spacing: 0.04em;
}
.sun-info-row span { color: var(--accent); }

/* ── SHIP DESIGNER ──────────────────────────────────────────────────── */
.ship-layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 52px);overflow:hidden}
/* Left panel - equipment browser */
.ship-left{background:#0d1117;border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.ship-right{display:flex;flex-direction:column;overflow:hidden;background:#0a0c0f}
/* Top bar */
.sd-topbar{display:flex;align-items:center;gap:0;padding:0;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg2)}
.sd-size-pill{padding:8px 20px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2);border-right:1px solid var(--border2);display:flex;align-items:center;gap:8px;cursor:default}
.sd-ship-name{flex:1;padding:8px 16px;font-family:var(--cond);font-size:14px;font-weight:600;color:var(--accent2);border-right:1px solid var(--border2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sd-loadout-btn{padding:8px 16px;font-family:var(--mono);font-size:11px;color:var(--text3);cursor:pointer;white-space:nowrap}
/* Tab bar */
.sd-tabbar{display:flex;border-bottom:1px solid var(--border2);flex-shrink:0;background:var(--bg2)}
.sd-tab{padding:9px 0;flex:1;text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);cursor:pointer;border-right:1px solid var(--border);position:relative;transition:color .15s,background .15s}
.sd-tab:last-child{border-right:none}
.sd-tab:hover{color:var(--text);background:var(--bg3)}
.sd-tab.active{color:var(--accent2);background:var(--bg3)}
.sd-tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.sd-tab-count{font-size:9px;color:var(--text3);margin-left:3px}
/* Equipment grid */
.sd-eq-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sd-eq-scroll::-webkit-scrollbar{width:4px}
.sd-eq-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.sd-eq-header{padding:8px 12px;font-family:var(--cond);font-size:13px;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);background:var(--panel)}
.sd-slot-group-head{padding:5px 12px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.sd-eq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);padding:0}
.sd-eq-item{background:var(--bg3);padding:10px 10px 8px;cursor:pointer;position:relative;transition:background .1s;display:flex;flex-direction:column;gap:4px}
.sd-eq-item:hover{background:var(--bg4)}
.sd-eq-item.selected{background:rgba(58,127,212,0.2);outline:2px solid var(--blue);outline-offset:-2px}
.sd-eq-item.none-item{background:var(--bg2)}
.sd-eq-item.none-item:hover{background:var(--bg3)}
.sd-item-icon{width:100%;aspect-ratio:1;background:rgba(255,255,255,.04);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--text3);margin-bottom:4px;position:relative;overflow:hidden}
.sd-item-icon.has-sel::after{content:'✓';position:absolute;top:3px;left:3px;font-size:12px;color:#4ecf7a;font-weight:700}
.sd-item-icon-none{font-size:32px;color:rgba(255,255,255,.15)}
.sd-item-name{font-family:var(--mono);font-size:10px;color:var(--text);line-height:1.3;word-break:break-word}
.sd-item-stat{font-family:var(--mono);font-size:9px;color:var(--accent);margin-top:1px}
.sd-item-badge{position:absolute;top:4px;right:4px;font-family:var(--mono);font-size:8px;padding:1px 4px;border-radius:2px;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
/* Ship list panel (when no ship selected) */
.ship-scroll{overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.ship-scroll::-webkit-scrollbar{width:4px}
.ship-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.size-group-label{padding:5px 14px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2}
.ship-list-item{padding:7px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:8px}
.ship-list-item:hover{background:var(--bg3)}
.ship-list-item.active{background:var(--accentdim);border-left:2px solid var(--accent)}
.ship-list-item.active .sli-name{color:var(--accent2)}
.sli-name{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sli-meta{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0}
.sz-badge{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;font-weight:600;flex-shrink:0}
.sz-S{background:rgba(58,127,212,.2);color:#7aafec;border:1px solid rgba(58,127,212,.3)}
.sz-M{background:rgba(58,158,106,.2);color:#7acca0;border:1px solid rgba(58,158,106,.3)}
.sz-L{background:rgba(200,146,42,.2);color:#e8c070;border:1px solid rgba(200,146,42,.3)}
.sz-XL{background:rgba(196,74,58,.2);color:#e89088;border:1px solid rgba(196,74,58,.3)}
.sz-XXL{background:rgba(160,80,200,.2);color:#c8a0e8;border:1px solid rgba(160,80,200,.3)}
/* Right panel - ship view */
.ship-right-inner{flex:1;overflow:hidden;display:flex;flex-direction:column}
.ship-empty-right{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3)}
.ship-empty-icon{font-size:36px;opacity:.3}

<body>

<div class="header">

  <div style="display:flex;gap:0;margin-left:24px;border:1px solid var(--border2);border-radius:4px;overflow:hidden">

    <button id="tab-btn-ship" onclick="switchTab('ship')" style="padding:6px 18px;background:transparent;border:none;color:var(--text2);font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer">Ship Designer</button>

  <div class="header-right">
    <div class="sun-control">
      <span class="sun-icon">&#9728;</span>
      <span class="sun-label">Sunlight</span>

        <input type="range" min="10" max="400" step="1" value="100" id="sun-slider" oninput="syncSun('slider',this.value)">
        <div class="sun-input-wrap">
          <input type="number" class="sun-num-input" id="sun-input" min="10" max="400" value="100" oninput="syncSun('input',this.value)" onblur="clampSun()">
          <span class="sun-pct-sym">%</span>
        </div>
      </div>
      <span class="sun-desc" id="sun-desc">Baseline</span>
    </div>
    <div class="sun-control">
      <span class="sun-icon">&#128100;</span>
      <span class="sun-label">Workforce</span>
      <div class="sun-slider-wrap">
        <input type="range" min="0" max="100" step="1" value="0" id="wf-slider" oninput="syncWorkforce('slider',this.value)">
        <div class="sun-input-wrap">
          <input type="number" class="sun-num-input" id="wf-input" min="0" max="100" value="0" oninput="syncWorkforce('input',this.value)" onblur="clampWorkforce()">
          <span class="sun-pct-sym">%</span>
        </div>
      </div>
      <span class="sun-desc" id="wf-desc">No bonus</span>
    </div>
  </div>
</div>

<div id="tab-station"><div class="layout">
  <!-- LEFT -->
  <div class="left">
    <div class="panel-head">
      <span class="panel-title">Target Factories</span>
      <span class="sel-count" id="sel-count">0 selected</span>
    </div>

      <input type="text" placeholder="Search wares..." id="srch" oninput="doFilter(this.value)">
    </div>
    <div class="ware-scroll" id="ware-list"></div>
    <div class="left-footer">

  </div>

  <!-- RIGHT -->

      <div class="stat-card"><div class="stat-label">Your Selection</div><div class="stat-val" id="s-user">0</div></div>

</div>

<script>
const RAW = new Set(['ice','ore','silicon','hydrogen','helium','methane','nividium']);
const NAMES = {
  energycells:"Energy Cells",graphene:"Graphene",refinedmetals:"Refined Metals",
  siliconwafers:"Silicon Wafers",antimattercells:"Tibanna Cells",superfluidcoolant:"Superfluid Coolant",
  water:"Water",proteinpaste:"Bacta Solution",metallicmicrolattice:"Fibersteel",
  computronicsubstrate:"Darkfusion Cell",rhydoniumcell:"Rhydonium Core",hullparts:"Durasteel Plates",
  microchips:"Microchips",plasmaconductors:"Plasma Conductors",quantumtubes:"Capacitors",
  advancedcomposites:"Advanced Composites",engineparts:"Engine Parts",smartchips:"Smart Chips",
  scanningarrays:"Sensor Components",meat:"Meat",wheat:"Agricultural Goods",spices:"Spices",
  swampplant:"Hutt Chemicals",terranmre:"Cloning Vats",siliconcarbide:"Obsidian Composite",

  turretcomponents:"Turret Components",weaponcomponents:"Weapon Components",
  foodrations:"Food Rations",medicalsupplies:"Medical Supplies",spacefuel:"Contraband Alcohol",
  spaceweed:"Hutt Spice",shipsupplies:"Ship Supplies",
  ice:"Ice",ore:"Ore",silicon:"Silicon",hydrogen:"Hydrogen",helium:"Helium",methane:"Methane",nividium:"Nividium"

// Max workforce per factory module
const WORKFORCE = {
  advancedcomposites:315, advancedelectronics:540, antimattercells:180,
  antimatterconverters:1080, claytronics:1215, dronecomponents:675,
  energycells:90, engineparts:225, fieldcoils:810, foodrations:90,
  graphene:180, hullparts:270, meat:75, medicalsupplies:90, microchips:450,
  missilecomponents:22, plasmaconductors:225, quantumtubes:225,
  refinedmetals:225, scanningarrays:315, shieldcomponents:225,
  siliconwafers:225, smartchips:60, spacefuel:225, spaceweed:90,
  spices:60, superfluidcoolant:180, swampplant:50, terranmre:0,
  turretcomponents:225, water:180, weaponcomponents:225, wheat:75,
};

// Max output bonus from full workforce (linear 0→this at 100% staffing)
const WORK_BONUS = {
  advancedcomposites:0.34, advancedelectronics:0.42, antimattercells:0.35,
  antimatterconverters:0.39, claytronics:0.34, computronicsubstrate:0.10,
  dronecomponents:0.43, energycells:0.43, engineparts:0.47, fieldcoils:0.43,
  foodrations:0.35, graphene:0.46, hullparts:0.37, meat:0.33,
  medicalsupplies:0.28, metallicmicrolattice:0.20, microchips:0.36,
  missilecomponents:0.53, plasmaconductors:0.43, proteinpaste:0.30,
  quantumtubes:0.53, refinedmetals:0.43, rhydoniumcell:0.40,
  scanningarrays:0.38, shieldcomponents:0.43, shipsupplies:0.30,
  siliconcarbide:0.20, siliconwafers:0.37, smartchips:0.37, spacefuel:0.69,
  spaceweed:0.70, spices:0.40, superfluidcoolant:0.49, swampplant:0.59,
  terranmre:0.42, turretcomponents:0.53, water:0.43, weaponcomponents:0.53, wheat:0.28,
};

let workforce = 0; // 0–100 percent

const BASE_EC = 525;

// transport types: C=container, L=liquid, S=solid
const TRANSPORT = {
  energycells:"C", graphene:"C", refinedmetals:"C", siliconwafers:"C",
  antimattercells:"C", superfluidcoolant:"C", water:"C", proteinpaste:"C",
  metallicmicrolattice:"C", computronicsubstrate:"C", rhydoniumcell:"C",
  hullparts:"C", microchips:"C", plasmaconductors:"C", quantumtubes:"C",
  advancedcomposites:"C", engineparts:"C", smartchips:"C", scanningarrays:"C",
  meat:"C", wheat:"C", spices:"C", swampplant:"C", terranmre:"C", siliconcarbide:"C",
  advancedelectronics:"C", antimatterconverters:"C", claytronics:"C",
  dronecomponents:"C", fieldcoils:"C", missilecomponents:"C", shieldcomponents:"C",
  turretcomponents:"C", weaponcomponents:"C", foodrations:"C", medicalsupplies:"C",
  spacefuel:"C", spaceweed:"C", shipsupplies:"C",
  // raw
  ore:"S", silicon:"S", hydrogen:"L", helium:"L", methane:"L", ice:"S", nividium:"S"
};

const RAW_VOL = {ore:10,silicon:10,hydrogen:6,helium:6,methane:6,ice:8,nividium:60};

const W = {
  energycells:      {tier:0,vol:1,  time:60,  amount:BASE_EC,inputs:[]},
  graphene:         {tier:1,vol:20, time:240, amount:288,  inputs:[{w:"energycells",a:160},{w:"methane",a:960}]},
  refinedmetals:    {tier:1,vol:14, time:150, amount:264,  inputs:[{w:"energycells",a:270},{w:"ore",a:720}]},
  siliconwafers:    {tier:1,vol:18, time:180, amount:321,  inputs:[{w:"energycells",a:270},{w:"silicon",a:720}]},
  antimattercells:  {tier:1,vol:18, time:120, amount:300,  inputs:[{w:"energycells",a:300},{w:"hydrogen",a:960}]},
  superfluidcoolant:{tier:1,vol:16, time:240, amount:285,  inputs:[{w:"energycells",a:180},{w:"helium",a:960}]},
  water:            {tier:1,vol:6,  time:120, amount:579,  inputs:[{w:"energycells",a:180},{w:"ice",a:960}]},
  proteinpaste:     {tier:1,vol:4,  time:300, amount:440,  inputs:[{w:"energycells",a:160},{w:"ice",a:160},{w:"methane",a:400}]},
  metallicmicrolattice:{tier:1,vol:1,time:180,amount:400,  inputs:[{w:"energycells",a:100},{w:"helium",a:260},{w:"ore",a:100}]},
  computronicsubstrate:{tier:1,vol:50,time:600,amount:200, inputs:[{w:"energycells",a:8000},{w:"hydrogen",a:4000},{w:"ore",a:6000},{w:"silicon",a:6000}]},
  rhydoniumcell:    {tier:1,vol:200,time:800, amount:30,   inputs:[{w:"energycells",a:4000},{w:"nividium",a:900}]},
  hullparts:        {tier:2,vol:12, time:900, amount:882,  inputs:[{w:"energycells",a:160},{w:"graphene",a:120},{w:"refinedmetals",a:840}]},
  microchips:       {tier:2,vol:22, time:600, amount:216,  inputs:[{w:"energycells",a:150},{w:"siliconwafers",a:600}]},
  plasmaconductors: {tier:2,vol:32, time:900, amount:132,  inputs:[{w:"energycells",a:180},{w:"graphene",a:288},{w:"superfluidcoolant",a:420}]},
  quantumtubes:     {tier:2,vol:22, time:720, amount:282,  inputs:[{w:"energycells",a:120},{w:"graphene",a:348},{w:"superfluidcoolant",a:90}]},
  advancedcomposites:{tier:2,vol:32,time:300, amount:162,  inputs:[{w:"energycells",a:150},{w:"graphene",a:240},{w:"refinedmetals",a:240}]},
  engineparts:      {tier:2,vol:15, time:900, amount:624,  inputs:[{w:"antimattercells",a:450},{w:"energycells",a:180},{w:"refinedmetals",a:288}]},
  smartchips:       {tier:2,vol:2,  time:600, amount:429,  inputs:[{w:"energycells",a:150},{w:"siliconwafers",a:60}]},
  scanningarrays:   {tier:2,vol:38, time:600, amount:108,  inputs:[{w:"energycells",a:180},{w:"refinedmetals",a:300},{w:"siliconwafers",a:180}]},
  meat:             {tier:2,vol:6,  time:450, amount:870,  inputs:[{w:"energycells",a:240},{w:"water",a:300}]},
  wheat:            {tier:2,vol:4,  time:300, amount:930,  inputs:[{w:"energycells",a:180},{w:"water",a:240}]},
  spices:           {tier:2,vol:3,  time:600, amount:1500, inputs:[{w:"energycells",a:120},{w:"water",a:240}]},
  swampplant:       {tier:2,vol:6,  time:450, amount:360,  inputs:[{w:"energycells",a:120},{w:"water",a:300}]},
  terranmre:        {tier:2,vol:2,  time:240, amount:115,  inputs:[{w:"energycells",a:120},{w:"proteinpaste",a:120}]},
  siliconcarbide:   {tier:2,vol:20, time:300, amount:100,  inputs:[{w:"energycells",a:400},{w:"metallicmicrolattice",a:4},{w:"methane",a:800},{w:"silicon",a:600}]},
  advancedelectronics:{tier:3,vol:30,time:720,amount:162,  inputs:[{w:"energycells",a:180},{w:"microchips",a:132},{w:"quantumtubes",a:60}]},
  antimatterconverters:{tier:3,vol:10,time:300,amount:399, inputs:[{w:"advancedcomposites",a:60},{w:"energycells",a:240},{w:"microchips",a:90}]},
  claytronics:      {tier:3,vol:24, time:900, amount:324,  inputs:[{w:"plasmaconductors",a:150},{w:"energycells",a:420},{w:"microchips",a:480},{w:"quantumtubes",a:300}]},
  dronecomponents:  {tier:3,vol:30, time:1200,amount:315,  inputs:[{w:"energycells",a:180},{w:"engineparts",a:60},{w:"hullparts",a:60},{w:"microchips",a:60},{w:"scanningarrays",a:120}]},
  fieldcoils:       {tier:3,vol:15, time:600, amount:525,  inputs:[{w:"energycells",a:180},{w:"plasmaconductors",a:120},{w:"quantumtubes",a:129}]},
  missilecomponents:{tier:3,vol:2,  time:900, amount:843,  inputs:[{w:"advancedcomposites",a:6},{w:"energycells",a:60},{w:"hullparts",a:6}]},
  shieldcomponents: {tier:3,vol:10, time:1200,amount:579,  inputs:[{w:"energycells",a:210},{w:"plasmaconductors",a:60},{w:"quantumtubes",a:60}]},
  turretcomponents: {tier:3,vol:20, time:1800,amount:410,  inputs:[{w:"energycells",a:120},{w:"microchips",a:40},{w:"quantumtubes",a:40},{w:"scanningarrays",a:30},{w:"antimattercells",a:60}]},
  weaponcomponents: {tier:3,vol:20, time:1800,amount:510,  inputs:[{w:"energycells",a:180},{w:"hullparts",a:60},{w:"antimattercells",a:180}]},
  foodrations:      {tier:3,vol:1,  time:240, amount:1380, inputs:[{w:"energycells",a:300},{w:"meat",a:150},{w:"spices",a:150},{w:"wheat",a:150}]},
  medicalsupplies:  {tier:3,vol:2,  time:300, amount:624,  inputs:[{w:"energycells",a:300},{w:"spices",a:120},{w:"water",a:180},{w:"wheat",a:90}]},
  spacefuel:        {tier:3,vol:2,  time:480, amount:294,  inputs:[{w:"energycells",a:120},{w:"water",a:300},{w:"wheat",a:240}]},
  spaceweed:        {tier:3,vol:3,  time:600, amount:549,  inputs:[{w:"energycells",a:420},{w:"spices",a:60},{w:"swampplant",a:360}]},
  shipsupplies:     {tier:4,vol:30, time:200, amount:20,   inputs:[{w:"foodrations",a:150},{w:"medicalsupplies",a:100},{w:"refinedmetals",a:50},{w:"water",a:50},{w:"energycells",a:100}]},
};

const TIER_LABELS = {
  0:"T0 — Base Resource",1:"T1 — Refined Materials",
  2:"T2 — Intermediate Goods",3:"T3 — Advanced Goods",4:"T4 — Final Assembly"
};

let userQty = {};
let sunlight = 100;
let filterStr = "";

function ecAmt() { return BASE_EC * (sunlight / 100); }
function phr(id, n) {
  const w = W[id]; if (!w || !w.time) return 0;
  const amt = (id === "energycells") ? ecAmt() : w.amount;
  const bonus = (WORK_BONUS[id] || 0) * (workforce / 100);
  return amt * (1 + bonus) / w.time * 3600 * n;
}
function fmt(n) {
  const a = Math.abs(n);
  if (a === 0) return "0";
  if (a >= 1e6) return (n/1e6).toFixed(2) + "M";
  if (a >= 1000) return (n/1000).toFixed(1) + "k";
  return Math.round(n).toLocaleString();
}
function nn(id) { return NAMES[id] || id; }

function syncSun(from, val) {
  let v = parseInt(val) || 10;
  v = Math.max(10, Math.min(400, v));
  sunlight = v;
  if (from !== 'slider') document.getElementById('sun-slider').value = v;
  if (from !== 'input')  document.getElementById('sun-input').value  = v;
  const desc = document.getElementById('sun-desc');
  const ec = Math.round(ecAmt());
  if (v < 100)       { desc.textContent = `${ec}/cycle (reduced)`; desc.className = 'sun-desc reduced'; }
  else if (v > 100)  { desc.textContent = `${ec}/cycle (boosted)`; desc.className = 'sun-desc boosted'; }
  else               { desc.textContent = `${ec}/cycle (baseline)`; desc.className = 'sun-desc'; }
  recalcIfActive();
}
function clampSun() {
  let v = parseInt(document.getElementById('sun-input').value) || 100;
  v = Math.max(10, Math.min(400, v));
  syncSun('input', v);
}

function syncWorkforce(from, val) {
  let v = parseInt(val);
  if (isNaN(v)) v = 0;
  v = Math.max(0, Math.min(100, v));
  workforce = v;
  if (from !== 'slider') document.getElementById('wf-slider').value = v;
  if (from !== 'input')  document.getElementById('wf-input').value  = v;
  const desc = document.getElementById('wf-desc');
  if (v === 0)         { desc.textContent = 'No bonus';       desc.className = 'sun-desc'; }
  else if (v === 100)  { desc.textContent = 'Fully staffed';  desc.className = 'sun-desc boosted'; }
  else                 { desc.textContent = `${v}% staffed`;  desc.className = 'sun-desc boosted'; }
  recalcIfActive();
}

function clampWorkforce() {
  let v = parseInt(document.getElementById('wf-input').value);
  if (isNaN(v)) v = 0;
  v = Math.max(0, Math.min(100, v));
  syncWorkforce('input', v);
}

function recalcIfActive() {
  if (document.getElementById('results-content').style.display !== 'none') {
    calculate();
  }
}

function buildWareList() {
  const tiers = {};
  for (const [id, w] of Object.entries(W)) {
    if (filterStr && !nn(id).toLowerCase().includes(filterStr)) continue;
    if (!tiers[w.tier]) tiers[w.tier] = [];
    tiers[w.tier].push(id);
  }
  let h = "";
  for (const t of Object.keys(tiers).sort((a,b) => a-b)) {
    h += `<div class="tier-label">${TIER_LABELS[t] || 'T'+t}</div>`;
    for (const id of tiers[t]) {
      const q = userQty[id] || 0;
      const isSun = id === "energycells";
      h += `<div class="ware-row">
        <span class="tier-badge t${W[id].tier}">T${W[id].tier}</span>
        <span class="ware-name">${nn(id)}${isSun ? ` <span class="sun-tag">&#9728; sunlight</span>` : ""}</span>
        <span class="ware-vol">${W[id].vol}m³</span>
        <div class="qty-ctrl">
          <button class="qb" onclick="adj('${id}',-1)">−</button>
          <span class="qn${q > 0 ? ' on' : ''}" id="qv-${id}">${q}</span>
          <button class="qb" onclick="adj('${id}',1)">+</button>
        </div>
      </div>`;
    }
  }
  document.getElementById("ware-list").innerHTML = h || `<div style="padding:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">No matches</div>`;
  updateSelCount();
}

function updateSelCount() {
  const n = Object.values(userQty).filter(v => v > 0).length;
  document.getElementById("sel-count").textContent = n > 0 ? `${n} selected` : "0 selected";
}

function adj(id, d) {
  userQty[id] = Math.max(0, (userQty[id] || 0) + d);
  const el = document.getElementById("qv-" + id);
  if (el) { el.textContent = userQty[id]; el.className = "qn" + (userQty[id] > 0 ? " on" : ""); }
  updateSelCount();
}

function doFilter(v) { filterStr = v.toLowerCase().trim(); buildWareList(); }

function resetAll() {
  userQty = {};
  syncSun('input', 100);
  syncWorkforce('input', 0);
  buildWareList();
  document.getElementById("stats-bar").style.display = "none";
  document.getElementById("empty-state").style.display = "flex";
  document.getElementById("results-content").style.display = "none";
}

function calcNet(facs) {
  const produced = {}, consumed = {};
  for (const [id, qty] of Object.entries(facs)) {
    const w = W[id]; if (!w || !qty) continue;
    produced[id] = (produced[id] || 0) + phr(id, qty);
    const cyclesHr = qty * 3600 / w.time;
    for (const inp of w.inputs) {
      consumed[inp.w] = (consumed[inp.w] || 0) + inp.a * cyclesHr;
    }
  }
  const netMap = {};
  new Set([...Object.keys(produced), ...Object.keys(consumed)]).forEach(id => {
    netMap[id] = (produced[id] || 0) - (consumed[id] || 0);
  });
  const rawNeeds = {};
  for (const [id, c] of Object.entries(consumed)) { if (RAW.has(id)) rawNeeds[id] = (rawNeeds[id] || 0) + c; }
  return { produced, consumed, netMap, rawNeeds };
}

function calculate() {
  const targets = {};
  for (const [id, q] of Object.entries(userQty)) { if (q > 0) targets[id] = q; }
  if (!Object.keys(targets).length) return;

  const allFacs = { ...targets };
  for (let i = 0; i < 30; i++) {
    const { netMap } = calcNet(allFacs);
    let changed = false;
    const deficits = Object.entries(netMap)
      .filter(([id, net]) => net < -0.01 && W[id] && !RAW.has(id))
      .sort((a, b) => (W[a[0]]?.tier || 0) - (W[b[0]]?.tier || 0));
    for (const [id, net] of deficits) {
      const w = W[id]; if (!w) continue;
      const amt = (id === "energycells") ? ecAmt() : w.amount;
      const perFac = amt / w.time * 3600;
      const need = Math.ceil(-net / perFac);
      if (need > 0) { allFacs[id] = (allFacs[id] || 0) + need; changed = true; }
    }
    if (!changed) break;
  }

  const { produced, consumed, netMap, rawNeeds } = calcNet(allFacs);
  renderResult({ targets, allFacs, produced, consumed, netMap, rawNeeds });
}

function renderResult({ targets, allFacs, produced, consumed, netMap, rawNeeds }) {
  const totalFacs   = Object.values(allFacs).reduce((a,b) => a+b, 0);
  const userTotal   = Object.values(targets).reduce((a,b) => a+b, 0);
  const supportFacs = {};
  for (const [id, q] of Object.entries(allFacs)) {
    const extra = q - (targets[id] || 0);
    if (extra > 0) supportFacs[id] = extra;
  }
  const supportTotal = Object.values(supportFacs).reduce((a,b) => a+b, 0);

  document.getElementById("s-total").textContent   = totalFacs;
  document.getElementById("s-user").textContent    = userTotal;
  document.getElementById("s-support").textContent = supportTotal;
  document.getElementById("s-raw").textContent     = Object.keys(rawNeeds).length;
  document.getElementById("stats-bar").style.display = "grid";
  document.getElementById("empty-state").style.display = "none";

  function netCell(id) {
    const net = netMap[id] || 0;
    const cls = net > 0.5 ? "net-surplus" : net < -0.5 ? "net-deficit" : "net-balanced";
    const sign = net > 0.5 ? "+" : net < -0.5 ? "−" : "";
    return `<td class="r"><span class="${cls}">${sign}${fmt(Math.abs(net))}/hr</span></td>`;
  }

  function storageTag(type) {
    if (type === "C") return `<span style="font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(58,127,212,0.15);color:#7aafec;border:1px solid rgba(58,127,212,0.3)">CON</span>`;
    if (type === "L") return `<span style="font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(58,158,106,0.15);color:#7acca0;border:1px solid rgba(58,158,106,0.3)">LIQ</span>`;
    if (type === "S") return `<span style="font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:2px;background:rgba(200,146,42,0.15);color:#e8c070;border:1px solid rgba(200,146,42,0.3)">SOL</span>`;
    return "";
  }

  // storageSummary: for each ware involved, accumulate max(produced, consumed) m3 as buffer needed
  // We use 1 hour of max(in,out) as recommended buffer
  function calcStorageNeeds(allFacs, produced, consumed) {
    const storNeeds = {C:0, L:0, S:0};
    const allIds = new Set([...Object.keys(produced), ...Object.keys(consumed)]);
    for (const id of allIds) {
      const p = produced[id] || 0;
      const c = consumed[id] || 0;
      const throughput = Math.max(p, c); // units/hr
      const vol = W[id]?.vol ?? RAW_VOL[id] ?? 1;
      const m3 = throughput * vol;
      const type = TRANSPORT[id] || "C";
      storNeeds[type] = (storNeeds[type] || 0) + m3;
    }
    return storNeeds;
  }

  function tableRows(entries) {
    return entries.map(([id, qty]) => {
      const isTarget = !!targets[id];
      const isSun = id === "energycells";
      const badge = isTarget
        ? `<span class="user-badge">yours</span>`
        : `<span class="support-badge">support</span>`;
      const sunBadge = isSun ? `<span class="sun-result-badge">&#9728; ${sunlight}%</span>` : "";
      const outputPhr = phr(id, qty);
      const vol = W[id]?.vol ?? 0;
      const m3hr = Math.round(outputPhr * vol);
      const type = TRANSPORT[id] || "C";
      const maxBonus = WORK_BONUS[id] || 0;
      const curBonus = maxBonus * (workforce / 100);
      const wfMax = WORKFORCE[id] || 0;
      const wfCell = wfMax > 0
        ? `<span style="font-family:var(--mono);font-size:11px;color:${curBonus>0?'#5ec490':'var(--text3)'}">+${(curBonus*100).toFixed(1)}%</span><span style="font-family:var(--mono);font-size:10px;color:var(--text3)"> / ${(maxBonus*100).toFixed(0)}% max</span>`
        : `<span style="font-family:var(--mono);font-size:10px;color:var(--text3)">—</span>`;
      return `<tr>
        <td><div class="rname-cell"><span class="tier-badge t${W[id]?.tier??0}">T${W[id]?.tier??0}</span>${badge}${sunBadge}<span>${nn(id)}</span></div></td>
        <td class="r">${storageTag(type)}</td>
        <td class="r qty-cell">${qty}×</td>
        <td class="r phr-cell">${fmt(outputPhr)}/hr</td>
        <td class="r phr-cell">${fmt(m3hr)} m³/hr</td>
        <td class="r">${wfCell}</td>
        ${netCell(id)}
      </tr>`;
    }).join("");
  }

  const sortedAllFacs = Object.entries(allFacs).sort((a,b) => (W[a[0]]?.tier??0) - (W[b[0]]?.tier??0));
  const yourEntries    = sortedAllFacs.filter(([id]) => targets[id]);
  const supportEntries = sortedAllFacs.filter(([id]) => !targets[id]);

  const THEAD = `<thead><tr><th>Ware</th><th class="r">Type</th><th class="r">Qty</th><th class="r">Output/hr</th><th class="r">m³/hr</th><th class="r">Workforce Bonus</th><th class="r">Net/hr</th></tr></thead>`;

  let h = `<div class="results-grid">`;

  // Your factories
  h += `<div class="result-section">
    <div class="sec-head">Your Selected Factories <span class="sec-count">${userTotal}</span></div>
    <table>${THEAD}<tbody>${tableRows(yourEntries)}</tbody></table>
  </div>`;

  // Support factories
  h += `<div class="result-section">
    <div class="sec-head">Supporting Factories Needed <span class="sec-count">${supportTotal}</span></div>
    ${supportEntries.length
      ? `<table>${THEAD}<tbody>${tableRows(supportEntries)}</tbody></table>`
      : `<div style="padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">All inputs already covered by your selection</div>`
    }
  </div>`;

  // Storage summary
  const storNeeds = calcStorageNeeds(allFacs, produced, consumed);
  const storEntries = [
    {type:"C", label:"Container Storage", color:"rgba(58,127,212,0.15)", tc:"#7aafec", bc:"rgba(58,127,212,0.3)"},
    {type:"L", label:"Liquid Storage",    color:"rgba(58,158,106,0.15)", tc:"#7acca0", bc:"rgba(58,158,106,0.3)"},
    {type:"S", label:"Solid Storage",     color:"rgba(200,146,42,0.15)", tc:"#e8c070", bc:"rgba(200,146,42,0.3)"},
  ].filter(e => storNeeds[e.type] > 0);

  h += `<div class="result-section full-width">
    <div class="sec-head">Recommended Storage Buffer <span class="sec-count" style="font-size:10px;color:var(--text3);background:none;border:none">1 hour throughput</span></div>
    <table>
      <thead><tr><th>Storage Type</th><th class="r">m³ Recommended</th><th class="r">Notes</th></tr></thead>
      <tbody>${storEntries.map(e => {
        const m3 = Math.round(storNeeds[e.type]);
        return `<tr>
          <td><span style="font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;background:${e.color};color:${e.tc};border:1px solid ${e.bc}">${e.type === "C" ? "CON" : e.type === "L" ? "LIQ" : "SOL"}</span> ${e.label}</td>
          <td class="r" style="font-family:var(--mono);font-size:13px;color:var(--text)">${fmt(m3)} m³</td>
          <td class="r" style="font-size:11px;color:var(--text3)">covers 1 hr of peak throughput</td>
        </tr>`;
      }).join("")}</tbody>
    </table>
  </div>`;

  // Raw materials
  const rawEntries = Object.entries(rawNeeds).sort((a,b) => b[1]-a[1]);
  h += `<div class="result-section full-width">
    <div class="sec-head">Raw Materials Required from Miners <span class="sec-count">${rawEntries.length} types</span></div>
    <table class="raw-table">
      <thead><tr><th>Resource</th><th class="r">Type</th><th class="r">Units/hr</th><th class="r">m³/hr</th></tr></thead>
      <tbody>${rawEntries.map(([id, amt]) => {
        const m3 = Math.round(amt * (RAW_VOL[id]||1));
        return `<tr><td>${nn(id)}</td><td class="r">${storageTag(TRANSPORT[id]||'S')}</td><td class="r raw-amt">${fmt(amt)}</td><td class="r raw-amt">${fmt(m3)}</td></tr>`;
      }).join("")}</tbody>
    </table>
  </div>`;

  // Sunlight note if EC modules present and non-baseline
  // Workforce summary
  let totalWorkers = 0, totalMaxWorkers = 0;
  for (const [id, qty] of Object.entries(allFacs)) {
    const maxWf = WORKFORCE[id] || 0;
    totalMaxWorkers += maxWf * qty;
    totalWorkers += Math.round(maxWf * qty * workforce / 100);
  }
  if (totalMaxWorkers > 0) {
    h += `<div class="result-section full-width">
      <div class="sec-head">Workforce Summary</div>
      <table>
        <thead><tr><th>Factory</th><th class="r">Workers/module</th><th class="r">Modules</th><th class="r">Total Max Workers</th><th class="r">At ${workforce}% Staffing</th><th class="r">Output Bonus</th></tr></thead>
        <tbody>${Object.entries(allFacs).filter(([id])=>WORKFORCE[id]>0).sort((a,b)=>(W[a[0]]?.tier??0)-(W[b[0]]?.tier??0)).map(([id,qty])=>{
          const wfMax = WORKFORCE[id];
          const curBonus = (WORK_BONUS[id]||0)*(workforce/100);
          const maxBonus = WORK_BONUS[id]||0;
          return `<tr>
            <td><div class="rname-cell"><span class="tier-badge t${W[id]?.tier??0}">T${W[id]?.tier??0}</span>${nn(id)}</div></td>
            <td class="r" style="font-family:var(--mono);font-size:12px">${wfMax}</td>
            <td class="r" style="font-family:var(--mono);font-size:12px">${qty}×</td>
            <td class="r" style="font-family:var(--mono);font-size:12px">${(wfMax*qty).toLocaleString()}</td>
            <td class="r" style="font-family:var(--mono);font-size:12px;color:${workforce>0?'#5ec490':'var(--text3)'}">${Math.round(wfMax*qty*workforce/100).toLocaleString()}</td>
            <td class="r" style="font-family:var(--mono);font-size:12px;color:${curBonus>0?'#5ec490':'var(--text3)'}">+${(curBonus*100).toFixed(1)}% / ${(maxBonus*100).toFixed(0)}% max</td>
          </tr>`;
        }).join('')}
        <tr style="border-top:1px solid var(--border2);background:var(--bg3)">
          <td style="font-weight:600">TOTAL</td>
          <td class="r"></td>
          <td class="r" style="font-family:var(--mono);font-size:12px;font-weight:600">${Object.values(allFacs).reduce((a,b)=>a+b,0)}×</td>
          <td class="r" style="font-family:var(--mono);font-size:12px;font-weight:600">${totalMaxWorkers.toLocaleString()}</td>
          <td class="r" style="font-family:var(--mono);font-size:12px;font-weight:600;color:${workforce>0?'#5ec490':'var(--text3)'}">${totalWorkers.toLocaleString()}</td>
          <td class="r"></td>
        </tr></tbody>
      </table>
    </div>`;
  }

  const ecMods = allFacs["energycells"] || 0;
  if (ecMods > 0 && sunlight !== 100) {
    const baselineEq = Math.ceil(ecMods * (100 / sunlight));
    h += `<div class="result-section full-width">
      <div class="sec-head">Sunlight Note</div>
      <div class="sun-info-row">
        At <span>${sunlight}%</span> sunlight: <span>${ecMods}</span> Energy Cell module${ecMods>1?"s":""} produce
        <span>${fmt(phr("energycells", ecMods))}/hr</span> —
        equivalent to <span>${baselineEq}</span> modules at 100% baseline
      </div>
    </div>`;
  }

  h += `</div>`;

  const rc = document.getElementById("results-content");
  rc.innerHTML = h;
  rc.style.display = "block";
}

buildWareList();
syncSun('input', 100);
