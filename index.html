// ══ SHIP DESIGNER STATE ═══════════════════════════════════════════════
let sdSelectedShip = null;
let sdFilter = '';
let sdLoadout = {};
let sdActiveTab = 'engine'; // engine | thruster | shield | weapon | turret
let sdFullStats = false; // simple or full stats view

function sdToggleStatMode() {
    sdFullStats = !sdFullStats;
    const ship = sdSelectedShip;
    if (!ship) return;
    const t = sdComputeTotals(ship);
    const el = document.getElementById('sd-stats-panel');
    if (el) el.outerHTML = sdBuildStats(ship, t);
}

const GENERIC_SD = new Set(['weapon','shield','engine','thruster','component','platformcollision',
    'unhittable','hittable','symmetry_1','symmetry_left','symmetry_right','iklink','part',
    'nocollision','forceoutline','detail_l','detail_xl','detail_xs','noshield','standard',
    'left','right','shieldgenerator','station']);
const SIZES_SD = new Set(['small','medium','large','extralarge','extralargeheavy','extralargelight',
    'largeheavy','largelight']);

function sdSpecific(tags) {
    return tags.filter(t => !GENERIC_SD.has(t) && !SIZES_SD.has(t));
}
function sdTagsMatch(equipTags, slotTags) {
    const eqSet = new Set(equipTags);
    const slSpec = sdSpecific(slotTags);
    if (!slSpec.length) {
        const slSizes = slotTags.filter(t => SIZES_SD.has(t));
        if (!slSizes.length) return true;
        return slSizes.some(s => eqSet.has(s));
    }
    return slSpec.some(t => eqSet.has(t));
}
function sdCompatible(equipDict, slotTags) {
    if (!slotTags || !slotTags.length) return [];
    return Object.values(equipDict).filter(e => sdTagsMatch(e.tags || [], slotTags));
}
function sdFmt(n) {
    if (!n) return '0';
    if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M';
    if (Math.abs(n) >= 1000) return (n/1000).toFixed(1)+'k';
    return Math.round(n).toLocaleString();
}

function switchTab(tab) {
    document.getElementById('tab-station').style.display = tab==='station' ? '' : 'none';
    document.getElementById('tab-ship').style.display = tab==='ship' ? '' : 'none';
    const stBtn = document.getElementById('tab-btn-station');
    const shBtn = document.getElementById('tab-btn-ship');
    stBtn.style.background = tab==='station' ? 'var(--accent)' : 'transparent';
    stBtn.style.color = tab==='station' ? '#0a0c0f' : 'var(--text2)';
    shBtn.style.background = tab==='ship' ? 'var(--accent)' : 'transparent';
    shBtn.style.color = tab==='ship' ? '#0a0c0f' : 'var(--text2)';
    if (tab === 'ship') renderShipTab();
}

function renderShipTab() {
    const container = document.getElementById('tab-ship');
    if (container.querySelector && container.querySelector('.ship-layout')) return;
    container.innerHTML = `
    <div class="ship-layout">
      <div class="ship-left" id="sd-left">
        <div class="panel-head">
          <span class="panel-title">Select Ship</span>
          <span id="sd-count" style="font-family:var(--mono);font-size:10px;color:var(--text3)">${Object.keys(SD.ships).length} ships</span>
        </div>
        <div class="ship-search"><input type="text" placeholder="Search ships..." id="sd-search" oninput="sdFilterShips(this.value)"></div>
        <div style="display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap">
          ${['S','M','L','XL','XXL'].map((sz,i) => {
            const c = {S:'#3a7fd4',M:'#3a9e6a',L:'#c8922a',XL:'#c44a3a',XXL:'#a050c8'}[sz];
            const fg = sz==='L'?'#0a0c0f':'#fff';
            const first = sz==='S';
            return `<button id="sz-btn-${sz}" onclick="sdToggleSize('${sz}')"
              style="width:46px;height:46px;border:1px solid ${first?c:'var(--border2)'};border-radius:3px;
                     background:${first?'rgba(58,127,212,0.85)':'var(--bg3)'};
                     color:${first?fg:'var(--text3)'};font-family:var(--mono);font-size:13px;
                     font-weight:${first?700:400};cursor:pointer;letter-spacing:.04em;
                     display:flex;align-items:center;justify-content:center">${sz}</button>`;
          }).join('')}
        </div>
        <div class="ship-scroll" id="sd-ship-list"></div>
      </div>
      <div class="ship-right" id="sd-right">
        <div class="ship-empty-right">
          <div class="ship-empty-icon">&#9673;</div>
          <div class="ship-empty-text">Select a ship from the left<br>to begin designing your loadout</div>
        </div>
      </div>
    </div>`;
    sdRenderShipList();
    setTimeout(() => sdToggleSize(sdActiveSizeFilter), 10);
}

let sdSizeFilter = new Set(['S','M','L','XL','XXL']); // kept for compat

function sdFilterShips(val) {
    sdFilter = val.toLowerCase().trim();
    sdRenderShipList();
}

const SZ_COLORS = {
    S:  {bg:'rgba(58,127,212,0.85)',  fg:'#fff', brd:'#3a7fd4'},
    M:  {bg:'rgba(58,158,106,0.85)',  fg:'#fff', brd:'#3a9e6a'},
    L:  {bg:'rgba(200,146,42,0.85)',  fg:'#0a0c0f', brd:'#c8922a'},
    XL: {bg:'rgba(196,74,58,0.85)',   fg:'#fff', brd:'#c44a3a'},
    XXL:{bg:'rgba(160,80,200,0.85)',  fg:'#fff', brd:'#a050c8'},
};

let sdActiveSizeFilter = 'S'; // single select

function sdToggleSize(sz) {
    sdActiveSizeFilter = sz;
    ['S','M','L','XL','XXL'].forEach(s => {
        const btn = document.getElementById('sz-btn-'+s);
        if (!btn) return;
        const on = s === sz;
        const c = SZ_COLORS[s];
        btn.style.background = on ? c.bg : 'var(--bg3)';
        btn.style.color = on ? c.fg : 'var(--text3)';
        btn.style.borderColor = on ? c.brd : 'var(--border2)';
        btn.style.fontWeight = on ? '700' : '400';
    });
    sdRenderShipList();
}

function sdRenderShipList() {
    const allShips = Object.values(SD.ships).filter(s =>
        s.size === sdActiveSizeFilter &&
        (!sdFilter || s.name.toLowerCase().includes(sdFilter))
    );
    allShips.sort((a,b) => a.name.localeCompare(b.name));
    const SIZE_ORDER = ['S','M','L','XL','XXL'];
    const bySz = {};
    SIZE_ORDER.forEach(sz => bySz[sz] = []);
    allShips.forEach(s => { if (bySz[s.size]) bySz[s.size].push(s); });

    let h = '';
    SIZE_ORDER.forEach(sz => {
        if (!bySz[sz].length || sz !== sdActiveSizeFilter) return;
        h += `<div class="size-group-label">${sz} — ${bySz[sz].length} ships</div>`;
        bySz[sz].forEach(s => {
            const active = sdSelectedShip && sdSelectedShip.id === s.id ? ' active' : '';
            const engC = s.slots.engine.reduce((a,sl)=>a+sl.count,0);
            const wpnC = s.slots.weapon.reduce((a,sl)=>a+sl.count,0) + s.slots.turret.reduce((a,sl)=>a+sl.count,0);
            const shC  = s.slots.shield.reduce((a,sl)=>a+sl.count,0);
            const szC2 = {S:'#7aafec',M:'#7acca0',L:'#e8c070',XL:'#e89088',XXL:'#c8a0e8'}[s.size]||'var(--text)';
            h += `<div class="ship-list-item${active}" onclick="sdSelectShip('${s.id}')">
              <span class="sli-name" style="color:${active?'var(--accent2)':szC2}">${s.name}</span>
              <span class="sli-meta">${engC}e ${wpnC}w ${shC}sh</span>
            </div>`;
        });
    });
    document.getElementById('sd-ship-list').innerHTML = h || '<div style="padding:20px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">No matches</div>';
}

function sdSelectShip(id) {
    sdSelectedShip = SD.ships[id];
    sdLoadout = {};
    sdActiveTab = 'engine';
    Object.keys(sdSubTab).forEach(k => delete sdSubTab[k]);
    sdRenderShipList();
    sdRenderShipRight();
}

// ── Determine which tabs are available for this ship ──────────────────
function sdGetTabs(ship) {
    const tabs = [];
    const isCapital = ship.size === 'L' || ship.size === 'XL' || ship.size === 'XXL';
    if (ship.slots.engine.length) tabs.push({id:'engine', label:'Engine', count: ship.slots.engine.reduce((a,s)=>a+s.count,0)});
    tabs.push({id:'thruster', label:'Thruster', count:1});
    if (ship.slots.shield.length) tabs.push({id:'shield', label:'Shield', count: ship.slots.shield.reduce((a,s)=>a+s.count,0)});
    if (ship.slots.weapon.length) tabs.push({id:'weapon', label:'Weapon', count: ship.slots.weapon.reduce((a,s)=>a+s.count,0)});
    if (ship.slots.turret.length) {
        tabs.push({id:'turret', label:'Turret', count: ship.slots.turret.reduce((a,s)=>a+s.count,0)});
    }
    return tabs;
}

// ── Compute loadout totals ────────────────────────────────────────────
function sdComputeTotals(ship) {
    let totalShield=0, totalShieldRate=0, shieldDelay=0;
    let totalForward=0, totalTravel=0, totalBoost=0, totalBoostDur=0;
    let totalBoostCharge=0, totalBoostAccel=1.0, totalBoostRecharge=0;
    let totalWeaponDmg=0, totalTurretDmg=0;
    let totalStrafe=0, totalStrafePitch=0, totalStrafeYaw=0, totalStrafeRoll=0;

    ship.slots.engine.forEach((sg,gi) => {
        const eq = SD.engines[sdLoadout['engine_'+gi]];
        if (!eq) return;
        totalForward += (eq.forward||0) * sg.count;
        if ((eq.travel_thrust||0) > totalTravel) {
            totalTravel     = eq.travel_thrust;
            totalBoostCharge = eq.travel_charge||0;
        }
        if ((eq.boost_thrust||0) > totalBoost) {
            totalBoost        = eq.boost_thrust;
            totalBoostDur     = eq.boost_duration||0;
            totalBoostAccel   = eq.boost_acceleration||1.0;
            totalBoostRecharge = eq.boost_recharge||0;
        }
    });
    ship.slots.shield.forEach((sg,gi) => {
        const eq = SD.shields[sdLoadout['shield_'+gi]];
        if (!eq) return;
        totalShield += (eq.capacity||0)*sg.count;
        totalShieldRate += (eq.rate||0)*sg.count;
        if (!shieldDelay && eq.delay) shieldDelay = eq.delay;
    });
    // Engine group shields contribute to total shield
    (ship.engine_shields||[]).forEach((esg, esi) => {
        ship.slots.engine.forEach((_,gi) => {
            const eq = SD.shields[sdLoadout['engshield_'+gi+'_'+esi]];
            if (!eq) return;
            totalShield += (eq.capacity||0)*esg.count;
            totalShieldRate += (eq.rate||0)*esg.count;
        });
    });
    ship.slots.turret.forEach((sg,gi) => {
        const eqS = SD.shields[sdLoadout['tshield_'+gi]];
        if (eqS) { totalShield += (eqS.capacity||0)*sg.count; totalShieldRate += (eqS.rate||0)*sg.count; }
        const eqW = SD.weapons[sdLoadout['turret_'+gi]];
        if (eqW) totalTurretDmg += (eqW.display_dps||eqW.damage||0)*sg.count;
    });
    ship.slots.weapon.forEach((sg,gi) => {
        const eq = SD.weapons[sdLoadout['weapon_'+gi]];
        if (eq) totalWeaponDmg += (eq.display_dps||eq.damage||0)*sg.count;
    });
    const thrId = sdLoadout['thruster_0'];
    const thr = thrId ? SD.thrusters[thrId] : null;
    if (thr) {
        totalStrafe     = thr.strafe||0;
        totalStrafePitch = thr.pitch||0;
        totalStrafeYaw  = thr.yaw||0;
        totalStrafeRoll = thr.roll||0;
    }

    // X4 Physics:
    const dragFwd  = ship.drag_forward   || 1;
    const dragH    = ship.drag_horizontal || 1;
    const mass     = ship.mass || 1;
    const inYaw    = ship.inertia_yaw   || 1;
    const inPitch  = ship.inertia_pitch || 1;
    const inRoll   = ship.inertia_roll  || 1;

    const speedMs   = dragFwd > 0 && totalForward > 0 ? totalForward / dragFwd : 0;
    const accelMs2  = mass > 0 && totalForward > 0 ? totalForward / mass : 0;
    const boostMs   = speedMs > 0 && totalBoost > 0 ? speedMs * totalBoost : 0;
    const boostAccel = accelMs2 > 0 && totalBoostAccel > 0 ? accelMs2 * totalBoostAccel : 0;
    const boostRechargePct = totalBoostRecharge > 0 ? 100 / totalBoostRecharge : 0;
    const travelMs  = speedMs > 0 && totalTravel > 0 ? totalTravel * speedMs : 0;
    const strafeMs  = dragH > 0 && totalStrafe > 0 ? totalStrafe / dragH : 0;
    const strafeAcc = mass > 0 && totalStrafe > 0 ? totalStrafe / mass : 0;
    const yawDps    = inYaw   > 0 && totalStrafeYaw  > 0 ? totalStrafeYaw  / inYaw   : 0;
    const pitchDps  = inPitch > 0 && totalStrafePitch > 0 ? totalStrafePitch / inPitch : 0;
    const rollDps   = inRoll  > 0 && totalStrafeRoll  > 0 ? totalStrafeRoll  / inRoll  : 0;

    return {totalShield, totalShieldRate, shieldDelay, totalForward, totalTravel,
            totalBoost, totalBoostDur, totalBoostCharge, totalBoostAccel, totalBoostRecharge,
            totalWeaponDmg, totalTurretDmg, totalStrafe,
            speedMs, accelMs2, boostMs, boostAccel, boostRechargePct,
            travelMs, strafeMs, strafeAcc, yawDps, pitchDps, rollDps};
}

// ── Render right panel ────────────────────────────────────────────────
function sdRenderShipRight() {
    const ship = sdSelectedShip;
    const tabs = sdGetTabs(ship);
    if (!tabs.find(t=>t.id===sdActiveTab)) sdActiveTab = tabs[0]?.id || 'engine';

    const t = sdComputeTotals(ship);

    const tabsHtml = tabs.map(tab =>
        `<div class="sd-tab${tab.id===sdActiveTab?' active':''}" onclick="sdSetTab('${tab.id}')">
          ${tab.label}<span class="sd-tab-count">${tab.count}</span>
        </div>`
    ).join('');

    const statsHtml = sdBuildStats(ship, t);
    const eqHtml = sdBuildEquipPanel(ship, sdActiveTab);

    document.getElementById('sd-right').innerHTML = `
    <div class="sd-topbar">
      <div class="sd-size-pill"><span class="sz-badge sz-${ship.size}">${ship.size}</span></div>
      <div class="sd-ship-name">${ship.name}</div>
      <div class="sd-loadout-btn" style="color:var(--text3);font-size:11px">${ship.ship_type} · ${ship.crew} crew</div>
    </div>
    <div style="display:flex;flex:1;overflow:hidden">
      <div style="width:340px;flex-shrink:0;border-right:1px solid var(--border2);display:flex;flex-direction:column">
        <div class="sd-tabbar">${tabsHtml}</div>
        <div class="sd-eq-scroll" id="sd-eq-panel">${eqHtml}</div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-family:var(--mono);font-size:11px;opacity:.4;letter-spacing:.06em;text-transform:uppercase;min-height:80px">
          ${ship.name}
        </div>
        <div style="display:flex;overflow:hidden;flex:0 0 auto;border-top:1px solid var(--border2);max-height:42vh">
          ${statsHtml}
          <div id="sd-materials-panel" style="width:300px;flex-shrink:0;border-left:1px solid var(--border2);background:var(--panel);display:flex;flex-direction:column;overflow:hidden">
            ${sdBuildMaterials(ship)}
          </div>
        </div>
      </div>
    </div>`;
}

function sdSetTab(tab) {
    sdActiveTab = tab;
    const ship = sdSelectedShip;
    if (!ship) return;
    document.getElementById('sd-eq-panel').innerHTML = sdBuildEquipPanel(ship, tab);
    // Recompute totals for stats update
    const t = sdComputeTotals(ship);
    const statsEl = document.getElementById('sd-stats-panel');
    if (statsEl) statsEl.outerHTML = sdBuildStats(ship, t);
    const matEl = document.getElementById('sd-materials-panel');
    if (matEl) matEl.innerHTML = sdBuildMaterials(ship);
    // Re-highlight active tab
    document.querySelectorAll('.sd-tab').forEach(el => {
        el.classList.toggle('active', el.getAttribute('onclick') === `sdSetTab('${tab}')`);
    });
}

// ── Sub-tab state per equipment category ─────────────────────────────
const sdSubTab = {}; // category -> slot group index

function sdSetSubTab(cat, gi) {
    sdSubTab[cat] = gi;
    const ship = sdSelectedShip;
    if (!ship) return;
    document.getElementById('sd-eq-panel').innerHTML = sdBuildEquipPanel(ship, sdActiveTab);
}

// ── Build sub-tab header (like game's XL1 XL2 L1 L2... buttons) ─────
function sdBuildSubTabs(slots, cat, filterFn, equipDict) {
    if (!slots || slots.length <= 1) return '';
    const cur = sdSubTab[cat] || 0;
    // Group slots by size for labeling
    const SIZE_LABELS = {small:'S',medium:'M',large:'L',extralarge:'XL',
                         extralargeheavy:'XLH',largeheavy:'LH',largelight:'LL'};
    // Count how many of each size
    const sizeCount = {};
    slots.forEach(sg => {
        const sz = sg.tags.find(t => SIZE_LABELS[t]) || '';
        const lbl = SIZE_LABELS[sz] || sz.toUpperCase().slice(0,3) || '?';
        if (!sizeCount[lbl]) sizeCount[lbl] = 0;
        sizeCount[lbl]++;
    });

    let h = '<div style="display:flex;flex-wrap:wrap;gap:3px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2)">';
    const szSeq = {};
    slots.forEach((sg, gi) => {
        const sz = sg.tags.find(t => SIZE_LABELS[t]) || '';
        const lbl = SIZE_LABELS[sz] || '?';
        if (!szSeq[lbl]) szSeq[lbl] = 0;
        szSeq[lbl]++;
        const btnLabel = sizeCount[lbl] > 1 ? `${lbl}${szSeq[lbl]}` : lbl;
        const active = gi === cur;
        h += `<button onclick="sdSetSubTab('${cat}',${gi})"
          style="min-width:38px;height:30px;padding:0 8px;border:1px solid ${active?'var(--accent)':'var(--border2)'};
                 border-radius:2px;background:${active?'var(--accent)':'var(--bg3)'};
                 color:${active?'#0a0c0f':'var(--text3)'};font-family:var(--mono);font-size:11px;
                 font-weight:${active?'700':'400'};cursor:pointer;letter-spacing:.04em">${btnLabel}</button>`;
    });
    // Show turret/shield counts for this group
    const sg = slots[cur];
    if (sg) {
        let compat = sdCompatible(equipDict, sg.tags);
        if (filterFn) compat = compat.filter(filterFn);
        const total = sg.count;
        h += `<span style="margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--text3);align-self:center;padding-right:4px">${compat.length} available · ${total} slots</span>`;
    }
    h += '</div>';
    return h;
}

// ── Build equipment selection panel ──────────────────────────────────
function sdBuildEquipPanel(ship, tab) {
    const isCapital = ship.size === 'L' || ship.size === 'XL' || ship.size === 'XXL';

    if (tab === 'engine') {
        const gi = sdSubTab['engine'] || 0;
        const subTabHtml = sdBuildSubTabs(ship.slots.engine, 'engine', null, SD.engines);
        const sg = ship.slots.engine[gi];
        if (!sg) return subTabHtml + '<div class="sd-eq-header">No engine slots</div>';
        let compat = sdCompatible(SD.engines, sg.tags);
        compat.sort((a,b) => (b.travel_thrust||0)-(a.travel_thrust||0));
        const selId = sdLoadout['engine_'+gi]||'';
        const specTags = sdSpecific(sg.tags);
        const engShields = ship.engine_shields || [];
        const shCount = engShields.reduce((a,s)=>a+s.count,0);

        let h = subTabHtml;
        // Engine / shield summary like game UI
        if (shCount > 0) {
            const equippedSh = engShields.reduce((total, esg, esi) =>
                total + (sdLoadout['engshield_'+gi+'_'+esi] ? esg.count : 0), 0);
            const equippedEng = sdLoadout['engine_'+gi] ? sg.count : 0;
            h += `<div style="display:flex;justify-content:space-between;padding:5px 12px;
                  font-family:var(--mono);font-size:10px;color:var(--text2);border-bottom:1px solid var(--border)">
              <span>Engines: <span style="color:#4ecf7a">${equippedEng} / ${sg.count}</span></span>
              <span>Shield Generators: <span style="color:#4ecf7a">${equippedSh} / ${shCount}</span></span>
            </div>`;
        }
        h += `<div class="sd-slot-group-head">${compat.length} compatible · ${sg.count} slot${sg.count>1?'s':''}` +
             `<span style="margin-left:8px;opacity:.5;font-size:9px">${specTags.join(' · ')||'generic'}</span></div>` +
             `<div class="sd-eq-grid">${sdGridItem('','empty','engine_'+gi,'','',selId==='')}` +
             compat.map(e => sdGridItem(e.id, e.name, 'engine_'+gi, e.travel_thrust+' km/s', '', selId===e.id)).join('') +
             `</div>`;

        // Engine group shields
        engShields.forEach((esg, esi) => {
            const esk = 'engshield_'+gi+'_'+esi;
            let compatSh = sdCompatible(SD.shields, esg.tags);
            compatSh.sort((a,b) => (b.capacity||0)-(a.capacity||0));
            const selShId = sdLoadout[esk]||'';
            const szT = esg.tags.filter(t => SIZES_SD.has(t));
            h += `<div class="sd-slot-group-head" style="margin-top:4px">↳ Choose a shield · ${esg.count}× · ${compatSh.length} compatible` +
                 `<span style="margin-left:8px;opacity:.5;font-size:9px">${szT.join(' · ')||'any'}</span></div>` +
                 `<div class="sd-eq-grid">${sdGridItem('','empty',esk,'','',selShId==='')}` +
                 compatSh.map(s => sdGridItem(s.id, s.name, esk, sdFmt(s.capacity)+' MJ', '', selShId===s.id)).join('') +
                 `</div>`;
        });
        return h;
    }

    if (tab === 'thruster') {
        const thrTag = ship.thruster_tags || [];
        const compat = sdCompatible(SD.thrusters, thrTag.length ? thrTag : ['small']);
        const selId = sdLoadout['thruster_0'] || '';
        let h = `<div class="sd-slot-group-head">${compat.length} compatible thrusters · 1 slot</div>`;
        h += `<div class="sd-eq-grid">${sdGridItem('','empty','thruster_0','','',selId==='')}`;
        compat.sort((a,b) => b.strafe-a.strafe).forEach(e => {
            h += sdGridItem(e.id, e.name, 'thruster_0', `Strafe ${e.strafe}`, `Mk${e.mk}`, selId===e.id);
        });
        return h + '</div>';
    }
    if (tab === 'shield') {
        const gi = sdSubTab['shield'] || 0;
        const subTabHtml = sdBuildSubTabs(ship.slots.shield, 'shield', null, SD.shields);
        const sg = ship.slots.shield[gi];
        if (!sg) return subTabHtml + '<div class="sd-eq-header">No shield slots</div>';
        let compat = sdCompatible(SD.shields, sg.tags);
        compat.sort((a,b) => (b.capacity||0)-(a.capacity||0));
        const selId = sdLoadout['shield_'+gi]||'';
        const specTags = [...sdSpecific(sg.tags), ...sg.tags.filter(t=>SIZES_SD.has(t))];
        return subTabHtml +
            `<div class="sd-slot-group-head">${compat.length} compatible · ${sg.count} slot${sg.count>1?'s':''}<span style="margin-left:8px;opacity:.5;font-size:9px">${specTags.slice(0,4).join(' · ')||'any'}</span></div>` +
            `<div class="sd-eq-grid">${sdGridItem('','empty','shield_'+gi,'','',selId==='')}${compat.map(s=>sdGridItem(s.id,s.name,'shield_'+gi,`${sdFmt(s.capacity)} MJ`,'',selId===s.id)).join('')}</div>`;
    }
    if (tab === 'weapon') {
        const gi = sdSubTab['weapon'] || 0;
        const filterFn = w => w.class==='weapon'||w.class==='missilelauncher';
        const subTabHtml = sdBuildSubTabs(ship.slots.weapon, 'weapon', filterFn, SD.weapons);
        const sg = ship.slots.weapon[gi];
        if (!sg) return subTabHtml + '<div class="sd-eq-header">No weapon slots</div>';
        // Turret matching: use SIZE as primary filter (not specific slot mount tags)
        const trtSizes = sg.tags.filter(t => SIZES_SD.has(t));
        let compat = Object.values(SD.weapons).filter(w => {
            if (!filterFn(w)) return false;
            if (!trtSizes.length) return true;
            return trtSizes.some(sz => (w.tags||[]).includes(sz));
        });
        compat.sort((a,b) => (b.display_dps||b.hull||0)-(a.display_dps||a.hull||0));
        const selId = sdLoadout['weapon_'+gi]||'';
        const specTags = sdSpecific(sg.tags);
        return subTabHtml +
            `<div class="sd-slot-group-head">${compat.length} compatible · ${sg.count} slot${sg.count>1?'s':''}<span style="margin-left:8px;opacity:.5;font-size:9px">${specTags.slice(0,4).join(' · ')||'generic'}</span></div>` +
            `<div class="sd-eq-grid">${sdGridItem('','empty','weapon_'+gi,'','',selId==='')}${compat.map(w=>sdGridItem(w.id,w.name,'weapon_'+gi,(w.display_dps||w.damage)?`${sdFmt(w.display_dps||w.damage)} dps`:'','',selId===w.id)).join('')}</div>`;
    }
    if (tab === 'turret') {
        const isCapital = ship.size === 'L' || ship.size === 'XL' || ship.size === 'XXL';
        const groups = ship.turret_groups || [];
        if (!groups.length) return '<div class="sd-eq-header">No turret slots</div>';

        const gi = sdSubTab['turret'] || 0;
        const grp = groups[gi];
        if (!grp) return '';

        // Sub-tabs — use pre-computed label from data (XL1, XL2, L1... sorted XL>L>M>S)
        let h = '<div style="display:flex;flex-wrap:wrap;gap:3px;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2)">';
        groups.forEach((g, i2) => {
            const lbl = g.label || (g.size_label + (i2+1));
            const active = i2 === gi;
            h += `<button onclick="sdSetSubTab('turret',${i2})"
              style="min-width:38px;height:30px;padding:0 8px;border:1px solid ${active?'var(--accent)':'var(--border2)'};
                     border-radius:2px;background:${active?'var(--accent)':'var(--bg3)'};
                     color:${active?'#0a0c0f':'var(--text3)'};font-family:var(--mono);font-size:11px;
                     font-weight:${active?'700':'400'};cursor:pointer;letter-spacing:.04em">${lbl}</button>`;
        });
        h += '</div>';

        // Filter turrets using the group's turret_tags (proper tag matching)
        const trtTags = grp.turret_tags || [];
        const GENERIC_TRT = new Set(['turret','weapon','component','platformcollision',
            'unhittable','hittable','noshield','standard','combat','red','green','orange','blue',
            'symmetry_1','symmetry_left','symmetry_right']);
        const SIZES_TRT = new Set(['small','medium','large','extralarge','extralargeheavy',
            'extralargelight','largeheavy','largelight']);

        function specificTrt(tags) {
            return tags.filter(t => !GENERIC_TRT.has(t) && !SIZES_TRT.has(t));
        }
        function matchTurret(weapTags, slotTags) {
            const wSet = new Set(weapTags);
            const spec = specificTrt(slotTags);
            if (!spec.length) {
                // Size-only matching
                const sz = slotTags.filter(t => SIZES_TRT.has(t));
                return sz.length ? sz.some(s => wSet.has(s)) : true;
            }
            return spec.some(t => wSet.has(t));
        }

        const filterFn = w => w.class === 'turret' || w.class === 'missileturret';
        let compat = Object.values(SD.weapons).filter(w =>
            filterFn(w) && matchTurret(w.tags||[], trtTags)
        );
        compat.sort((a,b) => (b.display_dps||b.hull||0) - (a.display_dps||a.hull||0));

        const selId = sdLoadout['turret_'+gi] || '';
        const spec = specificTrt(trtTags);
        const szT = trtTags.filter(t => SIZES_TRT.has(t));
        const tagLabel = spec.length ? spec.join(' · ') : szT.join(' · ') || 'generic';

        h += `<div class="sd-slot-group-head">${compat.length} compatible · ${grp.turret_count}× <span style="opacity:.5;font-size:9px;margin-left:8px">${tagLabel}</span></div>`;
        h += `<div class="sd-eq-grid">` +
             sdGridItem('','empty','turret_'+gi,'','',selId==='') +
             compat.map(w => sdGridItem(w.id, w.name, 'turret_'+gi,
                 w.display_dps ? `${sdFmt(w.display_dps)} dps` : (w.hull ? `${sdFmt(w.hull)} HP` : ''),
                 '', selId===w.id)).join('') +
             `</div>`;

        // Shield for this turret group
        if (grp.shield_count > 0 && grp.shield_tags.length) {
            const shk = 'tshield_'+gi;
            let compatSh = sdCompatible(SD.shields, grp.shield_tags);
            compatSh.sort((a,b) => (b.capacity||0) - (a.capacity||0));
            const selShId = sdLoadout[shk] || '';
            const shSz = grp.shield_tags.filter(t => SIZES_SD.has(t));
            h += `<div class="sd-slot-group-head" style="margin-top:4px">` +
                 `↳ Choose a shield · ${grp.shield_count}× · ${compatSh.length} compatible` +
                 `<span style="opacity:.5;font-size:9px;margin-left:8px">${shSz.join(' · ')||'any'}</span></div>` +
                 `<div class="sd-eq-grid">` +
                 sdGridItem('','empty',shk,'','',selShId==='') +
                 compatSh.map(s => sdGridItem(s.id, s.name, shk,
                     sdFmt(s.capacity)+' MJ', '', selShId===s.id)).join('') +
                 `</div>`;
        }
        return h;
    }
    if (tab === 'turret_OLD') {
        const isCapital = ship.size === 'L' || ship.size === 'XL' || ship.size === 'XXL';
        const slots = ship.slots.turret;
        if (!slots || !slots.length) return '';

        let h = '';
        slots.forEach((sg, gi) => {
            const key = 'turret_' + gi;
            const shieldKey = 'tshield_' + gi;
            let compat = sdCompatible(SD.weapons, sg.tags).filter(w => w.class==='turret'||w.class==='missileturret');
            compat.sort((a,b) => (b.damage||0) - (a.damage||0));
            const selId = sdLoadout[key] || '';
            const specTags = sdSpecific(sg.tags);
            const sizeTags = sg.tags.filter(t => SIZES_SD.has(t));
            const tagLabel = specTags.length ? specTags.join(' · ') : sizeTags.join(' · ') || 'generic';
            const groupLabel = slotGroupLabel(sg.tags, gi);

            h += `<div class="sd-slot-group-head">${groupLabel} · ${sg.count}× · ${compat.length} compatible<span style="font-family:var(--mono);font-size:9px;margin-left:8px;opacity:.6">${tagLabel}</span></div>`;
            h += `<div class="sd-eq-grid">`;
            h += sdGridItem('', 'empty', key, '', '', selId === '');
            compat.forEach(e => {
                h += sdGridItem(e.id, e.name, key, e.damage ? `${sdFmt(e.damage)} dps` : '', '', selId === e.id);
            });
            h += `</div>`;

            // Shield sub-section for this turret group (capital ships)
            if (isCapital) {
                // Find matching shields for this turret group's size
                const shieldSlotTags = [...sizeTags, 'shield'];
                const compatSh = sdCompatible(SD.shields, shieldSlotTags.length > 1 ? shieldSlotTags : ['shield']);
                const selShId = sdLoadout[shieldKey] || '';
                if (compatSh.length > 0) {
                    h += `<div class="sd-slot-group-head" style="padding-left:24px;opacity:.8">↳ Shield · ${sg.count}× · ${compatSh.length} compatible</div>`;
                    h += `<div class="sd-eq-grid">`;
                    h += sdGridItem('', 'empty', shieldKey, '', '', selShId === '');
                    compatSh.sort((a,b) => (b.capacity||0)-(a.capacity||0)).forEach(s => {
                        h += sdGridItem(s.id, s.name, shieldKey, sdFmt(s.capacity)+' MJ', '', selShId === s.id);
                    });
                    h += `</div>`;
                }
            }
        });
        return h;
    }
    if (tab === 'turret_shield') {
        return ''; // now handled inline in turret tab
    }
    return '<div class="sd-eq-header">No equipment</div>';
}

function sdBuildSlotGrid(ship, slotCat, equipDict, filterFn, sortVal, statFn, title, keyPrefix) {
    const slots = ship.slots[slotCat];
    if (!slots || !slots.length) return `<div class="sd-eq-header">No ${title} slots</div>`;
    const prefix = keyPrefix || slotCat;
    let h = '';
    slots.forEach((sg, gi) => {
        const key = prefix + '_' + gi;
        let compat = sdCompatible(equipDict, sg.tags);
        if (filterFn) compat = compat.filter(filterFn);
        compat.sort((a,b) => sortVal(b) - sortVal(a));
        const selId = sdLoadout[key] || '';
        const specTags = sdSpecific(sg.tags);
        const sizeTags = sg.tags.filter(t => SIZES_SD.has(t));
        const tagLabel = specTags.length ? specTags.join(' · ') : sizeTags.join(' · ') || 'generic';
        const slotLabel = slots.length > 1 ? `Slot ${gi+1} — ${sg.count}× (${tagLabel})` : `${sg.count}× (${tagLabel})`;
        h += `<div class="sd-slot-group-head">${title} · ${slotLabel} · ${compat.length} compatible</div>`;
        h += `<div class="sd-eq-grid">`;
        h += sdGridItem('', 'empty', key, '', '', selId === '');
        compat.forEach(e => {
            const stat = statFn ? statFn(e) : '';
            h += sdGridItem(e.id, e.name, key, stat, '', selId === e.id);
        });
        h += `</div>`;
    });
    return h;
}

function sdGridItem(id, name, slotKey, stat, badge, isSelected) {
    if (!id) {
        return `<div class="sd-eq-item none-item${isSelected?' selected':''}" onclick="sdPickEquip('${slotKey}','')">
          <div class="sd-item-icon"><span class="sd-item-icon-none">⊘</span></div>
          <div class="sd-item-name" style="color:var(--text3)">empty</div>
        </div>`;
    }
    const iconChar = slotKey.startsWith('engine') ? '⚡' :
                     slotKey.startsWith('thruster') ? '🔥' :
                     slotKey.startsWith('shield') || slotKey.startsWith('tshield') ? '🛡' :
                     slotKey.startsWith('weapon') ? '⚔' :
                     slotKey.startsWith('turret') ? '🎯' : '●';
    return `<div class="sd-eq-item${isSelected?' selected':''}" onclick="sdPickEquip('${slotKey}','${id}')">
      ${badge ? `<div class="sd-item-badge">${badge}</div>` : ''}
      <div class="sd-item-icon${isSelected?' has-sel':''}" style="font-size:22px;color:${isSelected?'var(--blue)':'rgba(255,255,255,.2)'}">${iconChar}</div>
      <div class="sd-item-name">${name}</div>
      ${stat ? `<div class="sd-item-stat">${stat}</div>` : ''}
    </div>`;
}

// ── Build materials panel ─────────────────────────────────────────────
function sdBuildMaterials(ship) {
    const totals = {};
    function addCostByKey(cost_key, qty) {
        if (!cost_key || qty <= 0) return;
        const cost = SD.equip_costs[cost_key] || SD.ship_costs[cost_key];
        if (!cost) return;
        Object.entries(cost.ingredients).forEach(([mat, amt]) => {
            totals[mat] = (totals[mat]||0) + amt * qty;
        });
    }

    // Ship hull
    addCostByKey(ship.cost_key, 1);

    // Engines
    ship.slots.engine.forEach((sg,gi) => {
        const eq = SD.engines[sdLoadout['engine_'+gi]];
        if (eq) addCostByKey(eq.cost_key, sg.count);
    });
    // Engine group shields
    (ship.engine_shields||[]).forEach((esg,esi) => {
        ship.slots.engine.forEach((_,gi) => {
            const eq = SD.shields[sdLoadout['engshield_'+gi+'_'+esi]];
            if (eq) addCostByKey(eq.cost_key, esg.count);
        });
    });
    // Thruster
    const thr = SD.thrusters[sdLoadout['thruster_0']];
    if (thr) addCostByKey(thr.cost_key, 1);
    // Ship shields
    ship.slots.shield.forEach((sg,gi) => {
        const eq = SD.shields[sdLoadout['shield_'+gi]];
        if (eq) addCostByKey(eq.cost_key, sg.count);
    });
    // Forward weapons
    ship.slots.weapon.forEach((sg,gi) => {
        const eq = SD.weapons[sdLoadout['weapon_'+gi]];
        if (eq) addCostByKey(eq.cost_key, sg.count);
    });
    // Turrets + turret shields (group-based)
    const trtGrps = ship.turret_groups || ship.slots.turret || [];
    trtGrps.forEach((grp, gi) => {
        const cnt = grp.turret_count || grp.count || 1;
        const eqW = SD.weapons[sdLoadout['turret_'+gi]];
        if (eqW) addCostByKey(eqW.cost_key, cnt);
        const shCnt = grp.shield_count || 0;
        const eqS = SD.shields[sdLoadout['tshield_'+gi]];
        if (eqS && shCnt > 0) addCostByKey(eqS.cost_key, shCnt);
    });

    const entries = Object.entries(totals).sort((a,b) => b[1]-a[1]);
    if (!entries.length) {
        return `<div class="ship-stats-title" style="cursor:default">
          <span>Build Materials</span>
        </div>
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;color:var(--text3);text-align:center;padding:20px;line-height:1.8">
          Equip modules to see<br>build materials needed
        </div>
        <div style="padding:10px 12px;border-top:1px solid var(--border2)">
          <button onclick="sdSendToStation()" style="width:100%;padding:7px;border:1px solid var(--border2);border-radius:3px;background:var(--bg3);color:var(--text2);font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
            → Send to Station Calculator
          </button>
        </div>`;
    }

    const maxAmt = Math.max(...entries.map(([,v])=>v));
    let rows = entries.map(([mat, amt]) => {
        const name = SD.ware_names[mat] || mat;
        const pct = Math.min(100, Math.round(amt/maxAmt*100));
        return `<div class="stat-row">
          <div class="stat-name" style="font-size:10px">${name}</div>
          <div class="stat-value">${amt.toLocaleString()}</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');

    return `<div class="ship-stats-title" style="cursor:default">
        <span>Build Materials</span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${entries.length} types</span>
      </div>
      <div style="overflow-y:auto;flex:1;scrollbar-width:thin;scrollbar-color:var(--border2) transparent">
        ${rows}
      </div>
      <div style="padding:10px 12px;border-top:1px solid var(--border2);flex-shrink:0">
        <button onclick="sdSendToStation()" style="width:100%;padding:7px;border:1px solid var(--border2);border-radius:3px;background:var(--bg3);color:var(--text2);font-family:var(--cond);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'" onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
          → Send to Station Calculator
        </button>
      </div>`;
}

// ── Send materials to station calculator ──────────────────────────────
function sdSendToStation() {
    // Compute materials
    const ship = sdSelectedShip;
    if (!ship) return;
    const totals = {};
    function addCost(ware_id, qty) {
        const cost = SD.equip_costs[ware_id] || SD.ship_costs[ware_id];
        if (!cost) return;
        Object.entries(cost.ingredients).forEach(([mat, amt]) => {
            totals[mat] = (totals[mat]||0) + amt * qty;
        });
    }
    addCost(ship.cost_key, 1);
    ship.slots.engine.forEach((sg,gi) => { const eq=SD.engines[sdLoadout['engine_'+gi]]; if(eq) addCost(eq.cost_key,sg.count); });
    ship.slots.shield.forEach((sg,gi) => { const eq=SD.shields[sdLoadout['shield_'+gi]]; if(eq) addCost(eq.cost_key,sg.count); });
    ship.slots.weapon.forEach((sg,gi) => { const eq=SD.weapons[sdLoadout['weapon_'+gi]]; if(eq) addCost(eq.cost_key,sg.count); });
    (ship.turret_groups||ship.slots.turret||[]).forEach((grp,gi) => {
        const cnt = grp.turret_count||grp.count||1;
        const eqW=SD.weapons[sdLoadout['turret_'+gi]]; if(eqW) addCost(eqW.id.replace('_macro',''),cnt);
    });

    // Map materials to station ware IDs and set userQty in station calculator
    // We set quantities proportional to material needs, normalized to factory counts
    const WARE_TO_STATION = {
        hullparts:'hullparts', microchips:'microchips', engineparts:'engineparts',
        shieldcomponents:'shieldcomponents', weaponcomponents:'weaponcomponents',
        turretcomponents:'turretcomponents', advancedcomposites:'advancedcomposites',
        advancedelectronics:'advancedelectronics', antimatterconverters:'antimatterconverters',
        claytronics:'claytronics', dronecomponents:'dronecomponents', fieldcoils:'fieldcoils',
        missilecomponents:'missilecomponents', scanningarrays:'scanningarrays',
        smartchips:'smartchips', plasmaconductors:'plasmaconductors',
        quantumtubes:'quantumtubes', energycells:'energycells',
        graphene:'graphene', refinedmetals:'refinedmetals', siliconwafers:'siliconwafers',
    };

    // Switch to station tab and populate
    switchTab('station');

    // Scale: assume we want to build 1 ship per 24 hours
    // Factory output per hour comes from W object in station calculator
    Object.entries(totals).forEach(([mat, amt]) => {
        const wareId = WARE_TO_STATION[mat];
        if (!wareId || !W[wareId]) return;
        const w = W[wareId];
        const perHour = w.amount / w.time * 3600;
        // How many factories to produce this much in 24h?
        const needed = Math.ceil((amt / 24) / perHour);
        if (needed > 0) {
            userQty[wareId] = (userQty[wareId]||0) + needed;
            const el = document.getElementById('qv-'+wareId);
            if (el) { el.textContent = userQty[wareId]; el.className = 'qn on'; }
        }
    });
    calculate();

    // Show notification
    const note = document.createElement('div');
    note.style.cssText = 'position:fixed;top:70px;right:20px;background:var(--accent);color:#0a0c0f;padding:10px 18px;border-radius:4px;font-family:var(--cond);font-size:13px;font-weight:700;z-index:9999;letter-spacing:.06em;pointer-events:none';
    note.textContent = 'Materials sent to Station Calculator!';
    document.body.appendChild(note);
    setTimeout(() => note.remove(), 3000);
}


function sdPickEquip(slotKey, id) {
    if (id) sdLoadout[slotKey] = id;
    else delete sdLoadout[slotKey];
    const ship = sdSelectedShip;
    if (!ship) return;
    document.getElementById('sd-eq-panel').innerHTML = sdBuildEquipPanel(ship, sdActiveTab);
    const t = sdComputeTotals(ship);
    const statsEl = document.getElementById('sd-stats-panel');
    if (statsEl) statsEl.outerHTML = sdBuildStats(ship, t);
    const matEl = document.getElementById('sd-materials-panel');
    if (matEl) matEl.innerHTML = sdBuildMaterials(ship);
}

// ── Build stats panel ─────────────────────────────────────────────────
function sdBuildStats(ship, t) {
    const radarKm = Math.round((ship.radar||0) / 1000);
    function row(name, val, maxVal, active=true, decimals=0, isSimple=true) {
        if (!sdFullStats && !isSimple) return '';
        const n = parseFloat(val) || 0;
        const isActive = active && n > 0;
        const pct = maxVal > 0 ? Math.min(100, Math.round(n/maxVal*100)) : (n>0?50:0);
        let disp;
        if (decimals > 0) disp = n.toFixed(decimals);
        else if (n >= 1000) disp = n.toLocaleString('en',{maximumFractionDigits:0});
        else disp = n > 0 ? n.toFixed(0) : '0';
        const indent = name.startsWith('  ');
        return `<div class="stat-row" style="${indent?'padding-left:20px;':''}">
          <div class="stat-name${!isActive?' inactive':''}">${name.trim()}</div>
          <div class="stat-value${!isActive?' zero':''}">${disp}</div>
          <div class="stat-bar-wrap"><div class="stat-bar-fill" style="width:${pct}%;${n===0?'opacity:.2':''}"></div></div>
        </div>`;
    }
    const M = { hull:20e6, shield:30e6, sr:50000, radar:100,
                wpn:600000, turret:500000,
                speed:800, accel:200, bspeed:4000, baccel:500, bcap:200, brech:20,
                travel:25000, taccel:200, tcharge:60,
                strafe:400, stracc:100, ang:30,
                cont:200000, solid:200000, liq:200000,
                crew:2000, units:500, miss:500, dep:200, cm:200 };

    const tog = `${sdFullStats?'−':'+'}`;
    return `<div class="ship-stats-panel" id="sd-stats-panel">
      <div class="ship-stats-title" style="cursor:default">
        <span>Ship Statistics
          <button onclick="sdToggleStatMode()" style="margin-left:8px;width:18px;height:18px;border:1px solid var(--border2);border-radius:2px;background:var(--bg3);color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;line-height:1;padding:0;vertical-align:middle">${tog}</button>
        </span>
        <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${ship.size} · ${ship.ship_type}</span>
      </div>
      <div class="ship-stats-grid">
        <div class="stat-col">
          ${row('Hull (MJ)', ship.hull, M.hull, true, 0, true)}
          ${row('Shield (MJ)', t.totalShield, M.shield, t.totalShield>0, 0, true)}
          ${row('  Recharge Rate (MW)', t.totalShieldRate, M.sr, t.totalShieldRate>0, 0, false)}
          ${row('  Recharge Delay (s)', t.shieldDelay, 60, t.shieldDelay>0, 2, false)}
          ${row('Avg. Group Shield (MJ)', 0, 1, false, 0, false)}
          ${row('  Recharge Rate (MW)', 0, 1, false, 0, false)}
          ${row('  Recharge Delay (s)', 0, 1, false, 2, false)}
          ${row('Radar Range (km)', radarKm, M.radar, true, 0, true)}
          ${row('Burst Weapon Output (MW)', t.totalWeaponDmg, M.wpn, t.totalWeaponDmg>0, 0, true)}
          ${row('Sustained Weapon Output (MW)', 0, 1, false, 0, false)}
          ${row('Avg. Turret Output (MW)', t.totalTurretDmg, M.turret, t.totalTurretDmg>0, 0, true)}
          ${sdFullStats?'<div style="height:6px"></div>':''}
          ${row('Container Storage (m³)', ship.container_storage||0, M.cont, true, 0, true)}
          ${row('Solid Storage (m³)', 0, 1, false, 0, false)}
          ${row('Liquid Storage (m³)', 0, 1, false, 0, false)}
          ${row('Condensate Storage (m³)', 0, 1, false, 0, false)}
          ${sdFullStats?'<div style="height:6px"></div>':''}
          ${row('Number of M Docks', 0, 1, false, 0, false)}
          ${row('M Ship Capacity', ship.unit_storage||0, M.units, ship.unit_storage>0, 0, false)}
          ${row('Number of S Docks', 0, 1, false, 0, false)}
          ${row('S Ship Capacity', 0, 1, false, 0, false)}
        </div>
        <div class="stat-divider"></div>
        <div class="stat-col">
          ${row('Speed (m/s)', t.speedMs, M.speed, t.speedMs>0, 0, true)}
          ${row('  Acceleration (m/s²)', t.accelMs2, M.accel, t.accelMs2>0, 1, false)}
          ${row('Boost Speed (m/s)', t.boostMs, M.bspeed, t.boostMs>0, 0, true)}
          ${row('  Boost Acceleration (m/s²)', t.boostAccel, M.baccel, t.boostAccel>0, 1, false)}
          ${row('  Boost Capacity (s)', t.totalBoostDur, M.bcap, t.totalBoostDur>0, 1, false)}
          ${row('  Boost Recharge Rate (%/s)', t.boostRechargePct, M.brech, t.boostRechargePct>0, 1, false)}
          ${row('Travel Speed (m/s)', t.travelMs, M.travel, t.travelMs>0, 0, true)}
          ${row('  Travel Acceleration (m/s²)', t.accelMs2, M.taccel, t.accelMs2>0, 1, false)}
          ${row('  Travel Charge Time (s)', t.totalBoostCharge, M.tcharge, t.totalBoostCharge>0, 1, false)}
          ${row('Strafe Speed (m/s)', t.strafeMs, M.strafe, t.strafeMs>0, 1, false)}
          ${row('  Strafe Acceleration (m/s²)', t.strafeAcc, M.stracc, t.strafeAcc>0, 1, false)}
          ${row('Yaw (°/s)', t.yawDps, M.ang, t.yawDps>0, 1, false)}
          ${row('Pitch (°/s)', t.pitchDps, M.ang, t.pitchDps>0, 1, false)}
          ${row('Roll (°/s)', t.rollDps, M.ang, t.rollDps>0, 1, false)}
          ${sdFullStats?'<div style="height:6px"></div>':''}
          ${row('Crew', ship.crew, M.crew, true, 0, true)}
          ${row('Units', ship.unit_storage||0, M.units, true, 0, true)}
          ${row('Missiles', ship.missile_storage||0, M.miss, true, 0, true)}
          ${row('Deployables', ship.deployable||ship.countermeasure||0, M.dep, true, 0, true)}
          ${row('Countermeasures', ship.countermeasure||0, M.cm, true, 0, true)}
        </div>
      </div>
    </div>`;
}
